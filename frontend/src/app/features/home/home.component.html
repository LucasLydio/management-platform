<section class="home-page">
  <!-- <img
    src="assets/img/web.png"
    alt=""
    class="home-page__web-image"
    aria-hidden="true"
  /> -->

  <div class="home-page-main">
    <p class="error" *ngIf="error()">{{ error() }}</p>
    @if (integrationFeedback(); as feedback) {
      <p class="integration-feedback" [class.integration-feedback--error]="feedback.tone === 'error'">
        {{ feedback.text }}
        <a *ngIf="feedback.linkUrl" [href]="feedback.linkUrl" rel="noreferrer" target="_blank">
          Open in Notion
        </a>
      </p>
    }

    <div class="options">
      <h3>Let's Start?!</h3>

      <div class="new-task-cta">
        <app-button (click)="handleNewTaskClick()">
          <h6>New Task,</h6>
          <h6>Click Here!</h6>
        </app-button>

        <span class="click-hint" aria-hidden="true">
          <i class="bi bi-hand-index-thumb-fill"></i>
        </span>
      </div>

      <app-options [taskId]="createTaskForm()?.selectedTask()?.id ?? null"></app-options>
    </div>

    <app-notebook></app-notebook>
  </div>
</section>

<ng-template #emptyState>
  <div class="empty-state" appRevealOnView>
    <app-pending-alert-animation />
    <strong>No tasks yet.</strong>
    <span>Add one and give future-you a breadcrumb.</span>
  </div>
</ng-template>
