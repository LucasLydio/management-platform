<ng-template #emptyState>
  <div class="empty-state" appRevealOnView>
    <app-pending-alert-animation />
    <strong>No tasks yet.</strong>
    <span>Add one and give future-you a breadcrumb.</span>
  </div>
</ng-template>

<ng-container *ngIf="isCreateTaskModalOpen()">
  <div class="task-modal-backdrop" (click)="closeCreateTaskModal()"></div>

  <section
    class="task-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="createTaskModalTitle"
    (click)="$event.stopPropagation()"
  >
    <header class="task-modal__header">
      <div>
        <p class="eyebrow">Create task</p>
        <h2 id="createTaskModalTitle">Add new task</h2>
      </div>

      <button type="button" class="btn-close" aria-label="Close modal" (click)="closeCreateTaskModal()"></button>
    </header>

    <div class="task-modal__body">
      <p class="modal-hint">Capture the task now. Sort it later with drag and drop.</p>

      <p class="error" *ngIf="createTaskError()">{{ createTaskError() }}</p>

      <app-task-form
        formId="create-task-form"
        [showActions]="false"
        (taskCreated)="createTask($event)"
      />
    </div>

    <footer class="task-modal__footer">
      <app-button variant="ghost" [disabled]="creatingTask()" (click)="closeCreateTaskModal()">Cancel</app-button>
      <app-button
        form="create-task-form"
        type="submit"
        [disabled]="isCreateSubmitDisabled()"
      >
        {{ creatingTask() ? "Creating..." : "Create task" }}
      </app-button>
    </footer>
  </section>
</ng-container>
