<form [id]="formId" [formGroup]="form" (ngSubmit)="submit()" class="task-form">
  <app-input
    inputId="task-title"
    label="Task title"
    placeholder="Close sprint plan"
    type="text"
    formControlName="title"
  />

  <app-input
    inputId="task-description"
    label="Description"
    placeholder="Add the tiny context future-you will need"
    [multiline]="true"
    [rows]="3"
    formControlName="description"
  />

  <div class="task-form__row">
    <app-select
      label="Priority"
      selectId="task-priority"
      [options]="priorityOptions"
      formControlName="priority"
    />

    <app-input
      inputId="task-due-date"
      label="Due date"
      type="datetime-local"
      formControlName="dueDate"
    />
  </div>

  @if (showActions) {
    <app-button type="submit" [disabled]="form.invalid">Add task</app-button>
  }
</form>
