<section class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Welcome back</p>
    <h1>Sign in and ship your tasks.</h1>
    <p class="muted">Use the seeded admin account after running the backend seed.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <app-input
        autocomplete="email"
        inputId="login-email"
        label="E-mail"
        type="email"
        formControlName="email"
      />

      <app-input
        autocomplete="current-password"
        inputId="login-password"
        label="Password"
        type="password"
        formControlName="password"
      />

      <p class="error" *ngIf="error()">{{ error() }}</p>

      <app-button type="submit" [disabled]="form.invalid || loading()">
        {{ loading() ? "Signing in..." : "Sign in" }}
      </app-button>
    </form>

    <div class="google-box">
      <app-input
        inputId="google-id-token"
        label="Google ID token"
        placeholder="Paste the Google ID token"
        type="text"
        [value]="googleToken()"
        (valueChange)="googleToken.set($any($event))"
      />
      <app-button variant="ghost" (click)="submitGoogle()">Continue with Google</app-button>
    </div>

    <a routerLink="/auth/register">Create an account</a>
  </div>
</section>
