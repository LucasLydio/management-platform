services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: management
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d management"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_PREFIX: api
      CORS_ORIGINS: http://localhost:8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/management
      JWT_ACCESS_SECRET: change-me-access-secret-with-at-least-24-chars
      JWT_REFRESH_SECRET: change-me-refresh-secret-with-at-least-24-chars
      NODE_ENV: production
      PORT: 3333
      REDIS_URL: redis://redis:6379
    ports:
      - "3333:3333"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:

